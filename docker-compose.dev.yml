version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    container_name: pmj-back-dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/.venv
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    stdin_open: true
    tty: true
