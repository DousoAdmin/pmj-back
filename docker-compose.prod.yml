# Configuración de producción para Docker Compose
# Usa MySQL en XAMPP en localhost
# Comando: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

version: '3.8'

services:
  app:
    command: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    
    environment:
      APP_ENV: production
      # BD prueba en XAMPP sin contraseña
      DATABASE_URL: mysql+pymysql://root@host.docker.internal:3306/prueba
    
    # Sin volúmenes en producción
    volumes: []
    
    # Limitar recursos
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Reinicio automático
    restart_policy:
      condition: on-failure
      delay: 5s
      max_attempts: 5
      window: 120s
    
