# Configuración de producción para Docker Compose
# Uso: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

version: '3.8'

services:
  app:
    # En producción NO usar reload
    command: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    
    environment:
      APP_ENV: production
    
    # NO montar volúmenes en producción
    volumes: []
    
    # Limitar recursos
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Reinicio automático
    restart_policy:
      condition: on-failure
      delay: 5s
      max_attempts: 5
      window: 120s

  db:
    # NO exponer puerto en producción
    ports: []
    
    environment:
      MYSQL_INITDB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    
    # Limitar recursos
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    restart_policy:
      condition: on-failure
      delay: 5s
      max_attempts: 5
