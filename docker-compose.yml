version: '3.8'

services:
  app:
    build: .
    container_name: pmj_app
    restart: always
    environment:
      APP_NAME: ${APP_NAME:-Plataforma Modular con FastAPI}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000

      # Conexión a MySQL en XAMPP (localhost del host)
      # host.docker.internal permite acceder a localhost desde el contenedor en Windows/Mac
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://root@host.docker.internal:3306/prueba}

      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    networks:
      - pmj_network

    # IMPORTANTE para acceder a localhost desde Docker
    extra_hosts:
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  pmj_network:
    driver: bridge