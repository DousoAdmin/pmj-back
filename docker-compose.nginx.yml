# Ejemplo de configuración con Nginx como reverse proxy
# Para usar: docker-compose -f docker-compose.yml -f docker-compose.nginx.yml up

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: pmj_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Descomentar para usar certificados SSL:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - pmj_network

networks:
  pmj_network:
    driver: bridge
